version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: poclain_wechat_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_test
      MYSQL_DATABASE: poclain_ai_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.0-alpine
    container_name: poclain_wechat_redis
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poclain_wechat_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # 🚨 架构师加固：硬核注入环境变量，强制接管底层库行为
    environment:
      - DATABASE_URL=mysql+pymysql://admin:password@db:3306/poclain_ai_db
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Shanghai
      # 🚨 物理封印：彻底掐断 ChromaDB 与 Posthog 的遥测心跳
      - ANONYMIZED_TELEMETRY=False
      - POSTHOG_DISABLED=1
      - CHROMA_TELEMETRY_IMPL=none
      # 🚨 物理锚点：强行将模型下载路径钉死在持久化数据卷中
      - SENTENCE_TRANSFORMERS_HOME=/app/model_cache
      - CHROMA_CACHE_DIR=/app/model_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2048M
        reservations:
          memory: 512M
    volumes:
      - ./backend:/app
      - ./backend/vector_db:/app/vector_db
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      # 🚨 挂载卷映射
      - chromadb_cache:/app/model_cache
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poclain_wechat_frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  redis_data: # 🚨 声明持久化模型卷

  chromadb_cache:
