version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: poclain_wechat_db
    restart: always
    environment:
      # 建议生产环境中将密码改得更复杂
      MYSQL_ROOT_PASSWORD: root_password_test
      MYSQL_DATABASE: poclain_ai_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    # 增加健康检查，确保后端启动时数据库已就绪
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0-alpine
    container_name: poclain_wechat_redis
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: poclain_wechat_backend
    restart: always
    ports:
      - "8000:8000"
    # 🚨 架构师防线：采用密文隔离加载
    # 所有的敏感密钥都去读取上一回合配置的 .env 文件，绝文明文写在这里
    env_file:
      - ./backend/.env
    environment:
      # 覆盖/补充 .env 中的数据库连接，确保使用 docker 内部网络名 (db, redis)
      - DATABASE_URL=mysql+pymysql://admin:password@db:3306/poclain_ai_db
      - REDIS_URL=redis://redis:6379/0
      # 【底层防线】强制掐断 ChromaDB 的遥测数据上报
      - ANONYMIZED_TELEMETRY=False
      - TZ=Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      # 挂载物理目录，确保重启容器后向量大脑和上传文件不丢失
      - ./backend/vector_db:/app/vector_db
      - ./backend/uploads:/app/uploads
      # 挂载日志目录，方便外部采集
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poclain_wechat_frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Shanghai
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
