server {
    listen 80;
    server_name localhost;

    # 🚨 致命修复：必须引入 MIME 类型字典，否则浏览器的严格安全策略将拒绝执行所有 JS/CSS
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ==========================================
    # 【S级安全加固】HTTP 严格安全响应头装甲
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # 允许 50M 载荷，防止多 Sheet Excel 向量化任务被网关切断
    client_max_body_size 50M;

    # ==========================================
    # 【性能优化】开启 Gzip 静态资源压缩引擎
    # ==========================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml font/woff font/woff2;
    gzip_min_length 1024;
    gzip_comp_level 5;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ==========================================
    # 1. 静态资源与 SPA 路由回退引擎 (History 模式核心防线)
    # ==========================================
    
    # 🚨 致命修复：针对 index.html 绝对禁止缓存！确保每次发版，用户都能立刻拉取到最新的 JS/CSS Hash 引用
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files /index.html =404;
    }

    location / {
        # Vue History 模式核心：找不到文件就回退给 index.html，交由 Vue Router 接管
        try_files $uri $uri/ /index.html;
    }
    
    # 🚨 性能加固：针对带有 Hash 签名的静态资源，开启 O(1) 级强缓存 (1年)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        # 物理熔断：如果真的找不到静态文件（如旧版本残留请求），直接返回 404，绝不回退给 index.html 引发解析死循环
        try_files $uri =404;
    }

    # ==========================================
    # 2. HTTP RESTful API 反向代理 (后端链路)
    # ==========================================
    location /api/ {
        proxy_pass http://backend:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 针对 RAG 大文件解析任务 (禁用缓冲 + 延长超时)
        proxy_request_buffering off;
        proxy_buffering off;
        
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # ==========================================
    # 3. WebSocket 全双工长连接升级通道
    # ==========================================
    location /ws/ {
        proxy_pass http://backend:8000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    
    # ==========================================
    # 4. 物理隔离：禁止访问隐藏文件 (防范 .git 目录泄漏)
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}